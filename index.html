<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>B.MIN Restaurante</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#8B0000,#c0392b);
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{

background:white;
width:90%;
max-width:420px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;

}

.logo{

width:100%;
border-radius:10px;
margin-bottom:20px;

}

h1{

margin:10px 0;
color:#8B0000;

}

h2{

font-size:18px;
font-weight:normal;
color:#555;
margin-bottom:25px;

}

.stars{

display:flex;
justify-content:center;
gap:10px;
margin-bottom:25px;

}

.star{

font-size:45px;
cursor:pointer;
color:#ccc;
transition:0.2s;

}

.star:hover,
.star.active{

color:#FFD700;
transform:scale(1.1);

}

.btn{

display:block;
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:17px;
color:white;
text-decoration:none;

}

.cardapio{

background:#8B0000;

}

.whatsapp{

background:#25D366;

}

footer{

margin-top:20px;
font-size:13px;
color:#888;

}

</style>

</head>

<body>

<div class="container">

<img src="banner-avaliacao.png" class="logo">

<h1>B.MIN Restaurante</h1>

<h2>Como foi sua experiência?</h2>

<div class="stars">

<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>

</div>

<a href="CARDAPIO.pdf" target="_blank" class="btn cardapio">
📖 Ver Cardápio
</a>

<a href="https://wa.me/5548999110086" target="_blank" class="btn whatsapp">
💬 Falar no WhatsApp
</a>

<footer>
Obrigado pela sua visita ❤️
</footer>

</div>

<script>

let stars = document.querySelectorAll('.star');

stars.forEach((star,index)=>{

star.addEventListener("mouseover",()=>{

stars.forEach((s,i)=>{
s.classList.toggle("active",i<=index);
});

});

});

function rate(n){

if(n<=3){

window.location.href="https://docs.google.com/forms/d/e/1FAIpQLSet07JYdALkic6AWeK6bVdxqcFgohAT9tp03yPqkTt159jDtQ/viewform";

}else{

window.location.href="https://www.google.com/search?q=restaurante+b,min";

}

}

</script>

</body>

</html>
